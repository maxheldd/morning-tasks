<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Today's Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#e8c84a;background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(160,130,0,0.13) 31px,rgba(160,130,0,0.13) 32px);font-family:'Caveat',cursive;display:flex;flex-direction:column;padding-bottom:20px;}
.tape{width:160px;height:34px;background:rgba(255,255,200,0.55);border-radius:3px;margin:-17px auto 0;}
header{text-align:center;padding:18px 40px 6px;}
.date-label{font-size:24px;color:rgba(100,70,0,0.7);margin-bottom:2px;}
h1{font-size:clamp(52px,8vw,90px);font-weight:700;color:#3a2500;line-height:1;}
.divider{width:95%;max-width:1400px;height:2px;background:rgba(100,70,0,0.18);margin:8px auto;}
.main{max-width:1400px;width:100%;margin:0 auto;padding:0 32px;}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:6px;}
.col-title-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.col-dot{width:17px;height:17px;border-radius:50%;flex-shrink:0;}
.col-label{font-size:30px;font-weight:700;}
.col-sub{font-size:17px;color:rgba(100,70,0,0.5);margin-bottom:8px;}
.col-carried .col-dot{background:#c0531a;} .col-carried .col-label{color:#5a1a00;}
.col-upcoming .col-dot{background:#2d7a3a;} .col-upcoming .col-label{color:#0a3a10;}

.task-item{display:flex;align-items:flex-start;gap:10px;padding:7px 2px;border-bottom:1px dashed rgba(100,70,0,0.18);position:relative;}
.task-item:last-of-type{border-bottom:none;}

.strike-btn{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid rgba(100,70,0,0.35);background:rgba(255,255,255,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,background .15s,transform .1s;margin-top:4px;position:relative;overflow:hidden;}
.strike-btn:hover{background:rgba(255,255,255,0.55);border-color:rgba(100,70,0,0.7);transform:scale(1.1);}
.strike-btn.struck{background:#b03010;border-color:#8a2008;}
.strike-btn .bx{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;}
.strike-btn.struck .bx{opacity:1;}
.strike-btn .bx svg{width:15px;height:15px;}
.sbpop{animation:sbp .3s cubic-bezier(.36,.07,.19,.97) forwards;}
@keyframes sbp{0%{transform:scale(1)}30%{transform:scale(1.45)}60%{transform:scale(.85)}80%{transform:scale(1.1)}100%{transform:scale(1)}}

.task-wrap{flex:1;position:relative;min-width:0;}

/* Base task text — wraps naturally, no horizontal scroll */
.task-text{
  font-size:26px;color:#3a2500;outline:none;line-height:1.35;
  word-break:break-word;white-space:normal;min-height:32px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  position:relative;z-index:1;transition:opacity .3s;
  width:100%;
}
/* While editing: show full text, still wraps */
.task-text.editing:not(.struck){
  display:block;-webkit-line-clamp:unset;overflow:visible;
}
/* When struck: expand fully so X covers the whole block */
.task-text.struck{
  display:block;overflow:visible;-webkit-line-clamp:unset;opacity:.32;
}
/* Blue links inside task text */
.task-text a, .task-text .link-token { color:#1a6bbf; text-decoration:underline; }
.task-text[contenteditable] { caret-color:#3a2500; }

.scanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:2;opacity:0;}
.scanvas.on{opacity:1;}

/* Hover overlay — hidden while .editing on the wrap */
.hover-ov{
  position:absolute;inset:0;background:rgba(232,200,74,0);
  border-radius:5px;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;z-index:3;
}
.task-wrap:not(.editing):hover .hover-ov{animation:hd .85s forwards;}
.task-wrap.editing .hover-ov,
.task-wrap:not(:hover) .hover-ov{opacity:0!important;pointer-events:none!important;animation:none!important;background:rgba(232,200,74,0)!important;}
@keyframes hd{
  0%,84%{opacity:0;background:rgba(232,200,74,0);pointer-events:none;}
  100%{opacity:1;background:rgba(200,165,30,.45);pointer-events:auto;}
}
.mfb{font-size:13px;font-family:'Caveat',cursive;background:rgba(255,248,220,.95);border:1.5px solid rgba(100,70,0,.35);color:rgba(70,45,0,.9);border-radius:8px;padding:4px 11px;cursor:pointer;white-space:nowrap;}
.mfb:hover{background:#fff8e0;}

.task-del{font-size:18px;background:none;border:none;cursor:pointer;color:rgba(100,70,0,.35);font-family:'Caveat',cursive;padding:2px 5px;border-radius:4px;flex-shrink:0;margin-top:4px;opacity:0;transition:opacity .15s;}
.task-item:hover .task-del{opacity:1;}

.day-badge{font-size:14px;padding:2px 8px;border-radius:8px;flex-shrink:0;white-space:nowrap;line-height:1.4;margin-top:6px;}
.db1{background:rgba(192,83,26,.2);color:#8a3a08;}
.db2{background:rgba(192,83,26,.35);color:#7a2a04;}
.db3{background:rgba(160,30,10,.5);color:#fff0e8;}

.particle{position:fixed;pointer-events:none;z-index:9999;animation:pf .5s ease-out forwards;}
@keyframes pf{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}

/* FOLDER */
.folder{margin-bottom:12px;border-radius:12px;overflow:hidden;border:1.5px dashed rgba(100,70,0,.25);background:rgba(255,255,255,.15);}
.fh{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;}
.fh:hover{background:rgba(255,255,255,.2);}
.fsb{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid rgba(100,70,0,.4);background:rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;position:relative;overflow:hidden;}
.fsb:hover{background:rgba(255,255,255,.5);transform:scale(1.1);}
.fsb.struck{background:#b03010;border-color:#8a2008;}
.fsb .bx{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;}
.fsb.struck .bx{opacity:1;}
.farrow{font-size:15px;color:rgba(100,70,0,.55);transition:transform .2s;flex-shrink:0;}
.farrow.open{transform:rotate(90deg);}
.fnw{flex:1;position:relative;overflow:visible;}
.fn{font-size:26px;font-weight:700;color:#3a2500;outline:none;background:transparent;border:none;font-family:'Caveat',cursive;display:block;position:relative;z-index:1;word-break:break-word;white-space:normal;width:100%;}
.fn.struck{opacity:.35;}
.fdel{opacity:0;font-size:18px;background:none;border:none;cursor:pointer;color:rgba(100,70,0,.5);font-family:'Caveat',cursive;padding:2px 6px;border-radius:4px;}
.fh:hover .fdel{opacity:1;}
.fb{display:none;padding:4px 14px 12px;border-top:1px dashed rgba(100,70,0,.2);}
.fb.open{display:block;}
.ftask{display:flex;align-items:flex-start;gap:10px;padding:5px 0;border-bottom:1px dashed rgba(100,70,0,.12);position:relative;}
.ftask:last-of-type{border-bottom:none;}
.ftask .task-del{opacity:0;} .ftask:hover .task-del{opacity:1;}
.ftask .task-text{font-size:23px;}

.add-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.add-input{font-size:26px;font-family:'Caveat',cursive;background:transparent;border:none;outline:none;color:#3a2500;opacity:.45;width:100%;}
.add-input:focus{opacity:1;} .add-input::placeholder{color:rgba(100,70,0,.4);}
.amini{width:22px;height:22px;border-radius:50%;border:2px dashed rgba(100,70,0,.35);background:none;cursor:pointer;font-size:18px;color:rgba(100,70,0,.45);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;flex-shrink:0;line-height:1;}
.amini:hover{background:rgba(255,255,255,.35);}
.aminput{font-size:23px;font-family:'Caveat',cursive;background:transparent;border:none;outline:none;color:#3a2500;opacity:.45;width:100%;}
.aminput:focus{opacity:1;} .aminput::placeholder{color:rgba(100,70,0,.4);}

.dbr{max-width:1400px;margin:4px auto 0;padding:0 32px;font-size:14px;color:rgba(100,70,0,.5);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.smbtn{font-size:14px;font-family:'Caveat',cursive;background:rgba(255,255,255,.3);border:1px dashed rgba(100,70,0,.3);color:rgba(80,55,0,.7);border-radius:6px;padding:2px 9px;cursor:pointer;}
.smbtn:hover{background:rgba(255,255,255,.5);}

/* LINK PREVIEW */
.link-preview{
  margin-top:6px;border-radius:10px;overflow:hidden;
  background:rgba(255,255,255,0.35);border:1.5px solid rgba(100,70,0,0.18);
  cursor:pointer;transition:background .15s;
  text-decoration:none;display:block;
  position:relative;
}
.link-preview:hover{background:rgba(255,255,255,0.55);}
.link-preview.struck .lp-thumb{opacity:0.28;transition:opacity .3s;}
.link-preview.struck .lp-body{opacity:0.35;transition:opacity .3s;}
.lp-x-canvas{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:4;opacity:0;}
.lp-x-canvas.on{opacity:1;}
.link-preview.yt{display:flex;flex-direction:column;}
.lp-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.lp-thumb-placeholder{width:100%;aspect-ratio:16/9;background:rgba(100,70,0,0.12);display:flex;align-items:center;justify-content:center;font-size:32px;}
.lp-body{padding:8px 12px;display:flex;align-items:center;gap:10px;}
.lp-favicon{width:18px;height:18px;border-radius:3px;flex-shrink:0;object-fit:contain;}
.lp-favicon-placeholder{width:18px;height:18px;border-radius:3px;background:rgba(100,70,0,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(100,70,0,0.6);}
.lp-info{flex:1;min-width:0;}
.lp-domain{font-size:14px;color:rgba(100,70,0,0.55);font-family:'Caveat',cursive;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp-url{font-size:17px;color:#3a2500;font-family:'Caveat',cursive;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.lp-open{font-size:13px;color:rgba(100,70,0,0.45);flex-shrink:0;font-family:'Caveat',cursive;}
</style>
</head>
<body>
<div class="tape"></div>
<header><div class="date-label" id="dl"></div><h1>Today's Tasks</h1></header>
<div class="divider"></div>
<div class="dbr">
  <span>test:</span>
  <button class="smbtn" onclick="skip(1)">+1 day</button>
  <button class="smbtn" onclick="skip(2)">+2 days</button>
  <button class="smbtn" onclick="skip(3)">+3 days</button>
  <button class="smbtn" onclick="resetD()">reset</button>
</div>
<div class="main">
  <div class="columns">
    <div class="col col-carried">
      <div class="col-title-row"><div class="col-dot"></div><div class="col-label">Carried Over</div></div>
      <div class="col-sub">not done yet</div>
      <div id="cl-carried"></div>
      <div class="add-row"><input class="add-input" placeholder="add a note..." id="inp-carried" onkeydown="colInput(event,'carried')"/></div>
    </div>
    <div class="col col-upcoming">
      <div class="col-title-row"><div class="col-dot"></div><div class="col-label">Up Next</div></div>
      <div class="col-sub">ideas &amp; future tasks</div>
      <div id="cl-upcoming"></div>
      <div class="add-row"><input class="add-input" placeholder="add a note..." id="inp-upcoming" onkeydown="colInput(event,'upcoming')"/></div>
    </div>
  </div>
</div>

<script>
const SK='sv9',DK='sd9',SMK='ss9';
const XS=`<svg viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="#e8c84a" stroke-width="2.2" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="#e8c84a" stroke-width="2.2" stroke-linecap="round"/></svg>`;

function ts(){const o=parseInt(localStorage.getItem(SMK)||'0'),d=new Date();d.setDate(d.getDate()+o);return d.toDateString();}
function db(a,b){return Math.round((new Date(b)-new Date(a))/864e5);}
function load(){const s=localStorage.getItem(SK);return s?JSON.parse(s):{carried:[],upcoming:[]}}
function save(){localStorage.setItem(SK,JSON.stringify(D));}
let D=load();

function rollover(){
  const last=localStorage.getItem(DK),today=ts();
  if(!last){localStorage.setItem(DK,today);return;}
  const days=db(last,today);if(days<=0)return;
  (D.carried||[]).forEach(x=>{if(!x.struck)x.daysOld=(x.daysOld||0)+days;});
  const tc=(D.upcoming||[]).filter(x=>!x.struck);
  tc.forEach(x=>x.daysOld=0);
  D.upcoming=(D.upcoming||[]).filter(x=>x.struck);
  D.carried=[...D.carried,...tc];
  localStorage.setItem(DK,today);save();
}

function render(){rc('carried');rc('upcoming');}
function rc(col){
  const el=document.getElementById('cl-'+col);el.innerHTML='';
  (D[col]||[]).forEach((item,i)=>el.appendChild(item.type==='folder'?mFolder(col,i,item):mTask(col,i,item)));
}

function badge(d,col){
  if(col!=='carried'||!d||d<1)return'';
  const c=d>=3?'db3':d===2?'db2':'db1';
  return`<span class="day-badge ${c}">-${d} day${d>1?'s':''}</span>`;
}

function measureH(text,w){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;visibility:hidden;top:-9999px;left:0;font-family:'Caveat',cursive;font-size:26px;line-height:1.35;width:${w}px;word-break:break-word;white-space:normal;`;
  t.innerText=text||'x';
  document.body.appendChild(t);const h=t.offsetHeight;document.body.removeChild(t);return h;
}
function isLong(text,w){
  const lineH=26*1.35;
  return measureH(text,w)>lineH*2+6;
}

function drawLine(ctx,w,h,instant){
  const y1=h*.48,y2=h*.57;
  if(instant){
    ctx.strokeStyle='#b03010';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,y1);ctx.lineTo(w,y1);ctx.stroke();
    ctx.strokeStyle='rgba(160,40,10,.45)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(2,y2);ctx.lineTo(w*.97,y2);ctx.stroke();return;
  }
  const dur=360,st=performance.now();
  (function f(now){
    const t=Math.min((now-st)/dur,1),e=1-Math.pow(1-t,3);
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='#b03010';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,y1+Math.sin(t*Math.PI)*2);ctx.lineTo(w*e,y1+Math.sin(t*Math.PI*2)*1.5);ctx.stroke();
    if(t>.08){
      const t2=Math.min((t-.08)/.7,1);
      ctx.strokeStyle=`rgba(160,40,10,${.45*t2})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(2,y2);ctx.lineTo(w*e*.95,y2+Math.sin(t*Math.PI));ctx.stroke();
    }
    if(t<1)requestAnimationFrame(f);
  })(performance.now());
}

function drawX(ctx,w,h,instant){
  const p=4;
  if(instant){
    ctx.lineCap='round';
    ctx.strokeStyle='#b03010';ctx.lineWidth=4.5;
    ctx.beginPath();ctx.moveTo(p,p);ctx.lineTo(w-p,h-p);ctx.stroke();
    ctx.strokeStyle='rgba(145,28,5,.78)';ctx.lineWidth=3.8;
    ctx.beginPath();ctx.moveTo(w-p,p);ctx.lineTo(p,h-p);ctx.stroke();return;
  }
  const d1=310,gap=60,d2=270,st=performance.now();
  (function f(now){
    const el=now-st;
    ctx.clearRect(0,0,w,h);ctx.lineCap='round';
    const t1=Math.min(el/d1,1),e1=1-Math.pow(1-t1,2.8);
    const wx=Math.sin(t1*Math.PI*5)*2.5,wy=Math.sin(t1*Math.PI*3)*2;
    ctx.strokeStyle='#b03010';ctx.lineWidth=4.5;
    ctx.beginPath();
    ctx.moveTo(p,p);
    ctx.lineTo(p+(w-p*2)*e1+wx,p+(h-p*2)*e1+wy);
    ctx.stroke();
    if(el>gap){
      const t2=Math.min((el-gap)/d2,1),e2=1-Math.pow(1-t2,2.8);
      const w2=Math.sin(t2*Math.PI*4)*2,w2y=Math.sin(t2*Math.PI*3.5)*1.8;
      ctx.strokeStyle=`rgba(145,28,5,${.78*e2})`;ctx.lineWidth=3.8;
      ctx.beginPath();
      ctx.moveTo(w-p,p);
      ctx.lineTo((w-p)-(w-p*2)*e2+w2,p+(h-p*2)*e2+w2y);
      ctx.stroke();
    }
    if(el<d1+gap+d2+50)requestAnimationFrame(f);
  })(performance.now());
}

function applyCanvas(cid,wid,text,instant){
  const canvas=document.getElementById(cid);
  const wrap=document.getElementById(wid);
  if(!canvas||!wrap)return;
  const w=wrap.offsetWidth||220;
  const long=isLong(text,w-4);
  // measure text height only — not the wrap (which includes link preview)
  const textEl=wrap.querySelector('.task-text');
  const textH=textEl?textEl.offsetHeight:Math.max(measureH(text,w-4),22);
  const h=long?Math.max(measureH(text,w-4),36):Math.max(textH,22);
  canvas.width=w;canvas.height=h;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  canvas.classList.add('on');
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,w,h);
  if(long)drawX(ctx,w,h,instant);else drawLine(ctx,w,h,instant);
}

function burst(btn){
  const r=btn.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  const colors=['#b03010','#e05020','#c04018','#ff6030','#8a2008'];
  for(let k=0;k<10;k++){
    const p=document.createElement('div');p.className='particle';
    const ang=(k/10)*Math.PI*2,dist=18+Math.random()*22,sz=3+Math.random()*4;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${colors[k%5]};--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist}px;border-radius:${Math.random()>.4?'50%':'2px'};`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),600);
  }
}

/* ── LINK PREVIEW ── */
function extractURL(text){
  const m=text.match(/https?:\/\/[^\s]+/);
  return m?m[0]:null;
}

function ytVideoId(url){
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}

function getDomain(url){
  try{return new URL(url).hostname.replace('www.','');}catch(e){return url;}
}

function buildPreview(url){
  const ytId=ytVideoId(url);
  const domain=getDomain(url);
  const a=document.createElement('a');
  a.className='link-preview';
  a.href=url;
  a.target='_blank';
  a.rel='noopener noreferrer';
  a.onclick=e=>e.stopPropagation();

  if(ytId){
    a.classList.add('yt');
    const thumb=document.createElement('img');
    thumb.className='lp-thumb';
    thumb.src=`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
    thumb.onerror=()=>{thumb.replaceWith(Object.assign(document.createElement('div'),{className:'lp-thumb-placeholder',innerHTML:'▶'}));};
    a.appendChild(thumb);
    const body=document.createElement('div');
    body.className='lp-body';
    const fav=document.createElement('img');
    fav.className='lp-favicon';
    fav.src=`https://www.google.com/s2/favicons?domain=youtube.com&sz=32`;
    fav.onerror=()=>fav.remove();
    const info=document.createElement('div');
    info.className='lp-info';
    info.innerHTML=`<div class="lp-domain">youtube.com</div><div class="lp-url">youtu.be/${ytId}</div>`;
    const open=document.createElement('div');
    open.className='lp-open';open.textContent='open ↗';
    body.append(fav,info,open);
    a.appendChild(body);
  } else {
    const body=document.createElement('div');
    body.className='lp-body';
    const fav=document.createElement('img');
    fav.className='lp-favicon';
    fav.src=`https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
    fav.onerror=()=>{
      const ph=document.createElement('div');
      ph.className='lp-favicon-placeholder';
      ph.textContent=domain[0].toUpperCase();
      fav.replaceWith(ph);
    };
    const info=document.createElement('div');
    info.className='lp-info';
    const short=url.replace(/^https?:\/\/(www\.)?/,'').slice(0,60)+(url.length>60?'…':'');
    info.innerHTML=`<div class="lp-domain">${domain}</div><div class="lp-url">${short}</div>`;
    const open=document.createElement('div');
    open.className='lp-open';open.textContent='open ↗';
    body.append(fav,info,open);
    a.appendChild(body);
  }
  // X canvas overlay for strike
  const xc=document.createElement('canvas');
  xc.className='lp-x-canvas';
  a.appendChild(xc);
  return a;
}

function attachPreview(wrap,text){
  const old=wrap.querySelector('.link-preview');
  if(old)old.remove();
  const url=extractURL(text);
  if(url) wrap.appendChild(buildPreview(url));
}

function colorizeLinks(tt){
  if(document.activeElement===tt)return;
  const text=tt.innerText;
  if(!extractURL(text)){tt.innerHTML=escHtml(text);return;}
  tt.innerHTML=escHtml(text).replace(/https?:\/\/[^\s]+/g,m=>`<span class="link-text" data-href="${m}" style="color:#1565c0;text-decoration:underline;cursor:pointer;">${m}</span>`);
  // attach mousedown on each link span so it fires before focus
  tt.querySelectorAll('.link-text').forEach(span=>{
    span.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      window.open(span.dataset.href,'_blank','noopener,noreferrer');
    });
  });
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── TASK ── */
function mTask(col,i,task){
  const d=document.createElement('div');
  d.className='task-item';d.id=`ti-${col}-${i}`;
  d.innerHTML=`
    <button class="strike-btn${task.struck?' struck':''}" id="sb-${col}-${i}" onclick="strikeT('${col}',${i})"><div class="bx">${XS}</div></button>
    <div class="task-wrap" id="tw-${col}-${i}">
      <div class="task-text${task.struck?' struck':''}" id="tt-${col}-${i}" contenteditable="true"
        onkeydown="tkey(event,'${col}',${i})"
      >${task.text}</div>
      <canvas class="scanvas${task.struck?' on':''}" id="sc-${col}-${i}"></canvas>
      <div class="hover-ov"><button class="mfb" onmousedown="event.preventDefault();toFolder('${col}',${i})">&#128193; make idea folder</button></div>
    </div>
    ${badge(task.daysOld,col)}
    <button class="task-del" onclick="delI('${col}',${i})">&#x2715;</button>
  `;
  const tw=d.querySelector('.task-wrap');
  const tt=d.querySelector('.task-text');
  let debounceT=null;
  function liveUpdate(){
    clearTimeout(debounceT);
    debounceT=setTimeout(()=>{
      attachPreview(tw,tt.innerText);
      colorizeLinks(tt);
    },400);
  }
  tt.addEventListener('input',liveUpdate);
  tt.addEventListener('paste',()=>setTimeout(liveUpdate,50));
  tt.addEventListener('focus',()=>{
    tw.classList.add('editing');
    if(!tt.classList.contains('struck'))tt.classList.add('editing');
    // restore plain text while editing so cursor works
    tt.innerText=tt.innerText;
  });
  tt.addEventListener('blur',()=>{
    clearTimeout(debounceT);
    tw.classList.remove('editing');
    tt.classList.remove('editing');
    updateT(col,i,tt.innerText);
    attachPreview(tw,tt.innerText);
    colorizeLinks(tt);
  });
  if(task.struck)setTimeout(()=>{
    applyCanvas(`sc-${col}-${i}`,`tw-${col}-${i}`,task.text,true);
    strikePreview(document.getElementById(`tw-${col}-${i}`),true);
  },60);
  setTimeout(()=>{
    const w=document.getElementById(`tw-${col}-${i}`);
    const t=document.getElementById(`tt-${col}-${i}`);
    if(w&&t){attachPreview(w,task.text);colorizeLinks(t);}
  },0);
  return d;
}

function strikePreview(tw, doStrike){
  const prev=tw.querySelector('.link-preview');
  if(!prev)return;
  const xc=prev.querySelector('.lp-x-canvas');
  if(!xc)return;
  if(!doStrike){
    prev.classList.remove('struck');
    xc.classList.remove('on');
    xc.getContext('2d').clearRect(0,0,xc.width,xc.height);
    return;
  }
  prev.classList.add('struck');
  // size canvas to full preview card
  const w=prev.offsetWidth, h=prev.offsetHeight;
  xc.width=w; xc.height=h;
  xc.style.width=w+'px'; xc.style.height=h+'px';
  xc.classList.add('on');
  drawX(xc.getContext('2d'),w,h,false);
}

function strikeT(col,i){
  const t=D[col][i];t.struck=!t.struck;save();
  const btn=document.getElementById(`sb-${col}-${i}`);
  const txt=document.getElementById(`tt-${col}-${i}`);
  const cv=document.getElementById(`sc-${col}-${i}`);
  const tw=document.getElementById(`tw-${col}-${i}`);
  if(t.struck){
    btn.classList.add('struck','sbpop');btn.addEventListener('animationend',()=>btn.classList.remove('sbpop'),{once:true});
    txt.classList.add('struck');txt.classList.remove('editing');
    tw.classList.remove('editing');
    burst(btn);
    setTimeout(()=>{
      applyCanvas(`sc-${col}-${i}`,`tw-${col}-${i}`,t.text,false);
      strikePreview(tw,true);
    },70);
  } else {
    btn.classList.remove('struck');txt.classList.remove('struck');
    if(cv){cv.classList.remove('on');cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}
    strikePreview(tw,false);
  }
}

function updateT(col,i,text){D[col][i].text=text.trim();save();}
function tkey(e,col,i){
  if(e.key==='Enter'){e.preventDefault();addI(col,i+1,'');setTimeout(()=>focusI(col,i+1),30);}
  if(e.key==='Backspace'&&e.target.innerText===''){e.preventDefault();delI(col,i);}
}
function toFolder(col,i){
  const t=D[col][i];
  D[col][i]={type:'folder',name:t.text||'New Folder',open:true,struck:false,daysOld:t.daysOld||0,tasks:[{text:'',struck:false}]};
  save();rc(col);
  setTimeout(()=>{const n=document.querySelector(`#fi-${col}-${i} .fn`);if(n){n.focus();selAll(n);}},40);
}

/* ── FOLDER ── */
function mFolder(col,i,f){
  const d=document.createElement('div');d.className='folder';d.id=`fi-${col}-${i}`;
  d.innerHTML=`
    <div class="fh" onclick="togF(event,'${col}',${i})">
      <button class="fsb${f.struck?' struck':''}" id="fsb-${col}-${i}" onclick="strikeF(event,'${col}',${i})"><div class="bx">${XS}</div></button>
      <span class="farrow${f.open?' open':''}">&#9658;</span>
      <div class="fnw" id="fnw-${col}-${i}">
        <div class="fn${f.struck?' struck':''}" id="fn-${col}-${i}" contenteditable="true"
          onclick="event.stopPropagation()"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${f.name}</div>
        <canvas class="scanvas${f.struck?' on':''}" id="fsc-${col}-${i}" style="position:absolute;top:0;left:0;pointer-events:none;z-index:5;"></canvas>
      </div>
      ${badge(f.daysOld,col)}
      <button class="fdel" onclick="delIE(event,'${col}',${i})">&#x2715;</button>
    </div>
    <div class="fb${f.open?' open':''}" id="fb-${col}-${i}">
      <div id="ft-${col}-${i}"></div>
      <div class="add-row" style="margin-top:4px;">
        <button class="amini" onclick="addFT('${col}',${i})">+</button>
        <input class="aminput" placeholder="add a note inside..." onkeydown="ftInput(event,'${col}',${i})"/>
      </div>
    </div>
  `;
  const tasksEl=d.querySelector(`#ft-${col}-${i}`);
  (f.tasks||[]).forEach((t,ti)=>tasksEl.appendChild(mFTask(col,i,ti,t)));
  if(f.struck)setTimeout(()=>applyFNStrike(col,i,true),60);
  // attach folder name link preview
  const fn=d.querySelector(`#fn-${col}-${i}`);
  const fnw=d.querySelector(`#fnw-${col}-${i}`);
  let fnDebounce=null;
  fn.addEventListener('input',()=>{
    clearTimeout(fnDebounce);
    fnDebounce=setTimeout(()=>{attachFolderPreview(fnw,fn.innerText);colorizeLinks(fn);},400);
  });
  fn.addEventListener('paste',()=>setTimeout(()=>{attachFolderPreview(fnw,fn.innerText);colorizeLinks(fn);},50));
  fn.addEventListener('focus',()=>{ fn.innerText=fn.innerText; });
  fn.addEventListener('blur',()=>{
    clearTimeout(fnDebounce);
    updFN(col,i,fn.innerText);
    attachFolderPreview(fnw,fn.innerText);
    colorizeLinks(fn);
  });
  setTimeout(()=>{
    const fnEl=document.getElementById(`fn-${col}-${i}`);
    const fnwEl=document.getElementById(`fnw-${col}-${i}`);
    if(fnEl&&fnwEl){attachFolderPreview(fnwEl,f.name);colorizeLinks(fnEl);}
  },0);
  return d;
}

function attachFolderPreview(fnw,text){
  const old=fnw.querySelector('.link-preview');
  if(old)old.remove();
  const url=extractURL(text);
  if(url){
    const prev=buildPreview(url);
    prev.style.cssText='margin-top:6px;position:relative;z-index:1;';
    fnw.appendChild(prev);
  }
}

function applyFNStrike(col,i,instant){
  const w=document.querySelector(`#fi-${col}-${i} .fnw`);
  const c=document.getElementById(`fsc-${col}-${i}`);
  if(!w||!c)return;
  c.width=w.offsetWidth;c.height=w.offsetHeight;c.classList.add('on');
  drawLine(c.getContext('2d'),c.width,c.height,instant);
}

function mFTask(col,fi,ti,task){
  const d=document.createElement('div');d.className='ftask';d.id=`ft-${col}-${fi}-${ti}`;
  d.innerHTML=`
    <button class="strike-btn${task.struck?' struck':''}" id="fsb2-${col}-${fi}-${ti}" onclick="strikeFT('${col}',${fi},${ti})"><div class="bx">${XS}</div></button>
    <div class="task-wrap" id="ftw-${col}-${fi}-${ti}">
      <div class="task-text${task.struck?' struck':''}" id="ftt-${col}-${fi}-${ti}" contenteditable="true"
        onblur="updFT('${col}',${fi},${ti},this.innerText)"
        onkeydown="ftKey(event,'${col}',${fi},${ti})"
      >${task.text}</div>
      <canvas class="scanvas${task.struck?' on':''}" id="ftc-${col}-${fi}-${ti}"></canvas>
    </div>
    <button class="task-del" onclick="delFT('${col}',${fi},${ti})">&#x2715;</button>
  `;
  const tw=d.querySelector('.task-wrap'),tt=d.querySelector('.task-text');
  tt.addEventListener('focus',()=>tw.classList.add('editing'));
  tt.addEventListener('blur',()=>tw.classList.remove('editing'));
  if(task.struck)setTimeout(()=>applyCanvas(`ftc-${col}-${fi}-${ti}`,`ftw-${col}-${fi}-${ti}`,task.text,true),60);
  return d;
}

function strikeFT(col,fi,ti){
  const t=D[col][fi].tasks[ti];t.struck=!t.struck;save();
  const btn=document.getElementById(`fsb2-${col}-${fi}-${ti}`);
  const txt=document.getElementById(`ftt-${col}-${fi}-${ti}`);
  const cv=document.getElementById(`ftc-${col}-${fi}-${ti}`);
  if(t.struck){
    btn.classList.add('struck','sbpop');btn.addEventListener('animationend',()=>btn.classList.remove('sbpop'),{once:true});
    txt.classList.add('struck');burst(btn);
    setTimeout(()=>applyCanvas(`ftc-${col}-${fi}-${ti}`,`ftw-${col}-${fi}-${ti}`,t.text,false),70);
  } else {
    btn.classList.remove('struck');txt.classList.remove('struck');
    if(cv){cv.classList.remove('on');cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}
  }
}

function strikeF(e,col,i){
  e.stopPropagation();
  const f=D[col][i];f.struck=!f.struck;(f.tasks||[]).forEach(t=>t.struck=f.struck);save();
  const btn=document.getElementById(`fsb-${col}-${i}`);
  if(f.struck){
    btn.classList.add('struck','sbpop');btn.addEventListener('animationend',()=>btn.classList.remove('sbpop'),{once:true});
    burst(btn);setTimeout(()=>applyFNStrike(col,i,false),70);
    (f.tasks||[]).forEach((t,ti)=>{
      const b=document.getElementById(`fsb2-${col}-${i}-${ti}`),x=document.getElementById(`ftt-${col}-${i}-${ti}`);
      if(b)b.classList.add('struck');if(x)x.classList.add('struck');
      setTimeout(()=>applyCanvas(`ftc-${col}-${i}-${ti}`,`ftw-${col}-${i}-${ti}`,t.text,false),80+ti*55);
    });
  } else {
    btn.classList.remove('struck');
    const fc=document.getElementById(`fsc-${col}-${i}`);
    if(fc){fc.classList.remove('on');fc.getContext('2d').clearRect(0,0,fc.width,fc.height);}
    (f.tasks||[]).forEach((_,ti)=>{
      const b=document.getElementById(`fsb2-${col}-${i}-${ti}`),x=document.getElementById(`ftt-${col}-${i}-${ti}`),c=document.getElementById(`ftc-${col}-${i}-${ti}`);
      if(b)b.classList.remove('struck');if(x)x.classList.remove('struck');
      if(c){c.classList.remove('on');c.getContext('2d').clearRect(0,0,c.width,c.height);}
    });
  }
}

function togF(e,col,i){
  if(e.target.closest('.fn')||e.target.closest('.fdel')||e.target.closest('.fsb'))return;
  D[col][i].open=!D[col][i].open;save();rc(col);
}
function updFN(col,i,t){D[col][i].name=t.trim()||'Folder';save();}
function addFT(col,fi,text=''){
  D[col][fi].tasks.push({text,struck:false});save();rc(col);
  setTimeout(()=>{const ts=document.querySelectorAll(`#ft-${col}-${fi} .task-text`);const l=ts[ts.length-1];if(l){l.focus();ce(l);}},30);
}
function ftInput(e,col,fi){if(e.key==='Enter'){const v=e.target.value.trim();if(v){addFT(col,fi,v);e.target.value='';}}}
function ftKey(e,col,fi,ti){
  if(e.key==='Enter'){e.preventDefault();updFT(col,fi,ti,e.target.innerText.trim());addFT(col,fi,'');}
  if(e.key==='Backspace'&&e.target.innerText===''){e.preventDefault();delFT(col,fi,ti);}
}
function updFT(col,fi,ti,t){D[col][fi].tasks[ti].text=t.trim();save();}
function delFT(col,fi,ti){
  D[col][fi].tasks.splice(ti,1);
  if(D[col][fi].tasks.length===0){
    const name=D[col][fi].name||'';
    D[col][fi]={type:'task',text:name,struck:false,daysOld:D[col][fi].daysOld||0};
  }
  save();rc(col);
}

function addI(col,at,t){D[col].splice(at,0,{type:'task',text:t,struck:false});save();rc(col);}
function delI(col,i){D[col].splice(i,1);save();rc(col);}
function delIE(e,col,i){e.stopPropagation();delI(col,i);}
function colInput(e,col){if(e.key==='Enter'){const v=e.target.value.trim();if(v){D[col].push({type:'task',text:v,struck:false});save();rc(col);e.target.value='';}}}
function focusI(col,i){const el=document.querySelector(`#ti-${col}-${i} .task-text`);if(el){el.focus();ce(el);}}
function selAll(el){const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}
function ce(el){const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}

function skip(days){
  const cur=parseInt(localStorage.getItem(SMK)||'0');
  const pd=new Date();pd.setDate(pd.getDate()+cur);
  localStorage.setItem(DK,pd.toDateString());localStorage.setItem(SMK,cur+days);
  rollover();render();updateDL();
}
function resetD(){localStorage.removeItem(SMK);localStorage.setItem(DK,new Date().toDateString());render();updateDL();}
function updateDL(){
  const o=parseInt(localStorage.getItem(SMK)||'0'),d=new Date();d.setDate(d.getDate()+o);
  document.getElementById('dl').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
rollover();render();updateDL();
</script>
</body>
</html>
